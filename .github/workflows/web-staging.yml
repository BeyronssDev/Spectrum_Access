name: Web staging deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy Firebase Hosting staging
    runs-on: ubuntu-latest
    if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @accessibilitat/shared build && pnpm --filter @accessibilitat/web build

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: staging
